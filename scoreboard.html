<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; width: 100%; height: 100%; }

  .board {
    display: inline-flex;
    align-items: center;
    background: rgba(15, 15, 30, 0.88);
    border-radius: 8px;
    overflow: hidden;
    font-family: Arial, sans-serif;
    border: 1px solid rgba(255,255,255,0.12);
    position: fixed;
    top: 16px;
    left: 16px;
  }

  .team {
    display: flex;
    align-items: center;
    padding: 10px 14px;
  }
  .team-name {
    font-size: 18px;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .score-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    padding: 10px 16px;
    border-left: 1px solid rgba(255,255,255,0.1);
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .score {
    font-size: 30px;
    font-weight: 600;
    color: #ffffff;
    min-width: 26px;
    text-align: center;
    line-height: 1;
  }
  .score-sep {
    font-size: 24px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
  }
  .period {
    background: #c0392b;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-left: 6px;
  }

  /* Панель управления */
  .controls {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(15,15,30,0.92);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    font-family: Arial, sans-serif;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ctrl-label {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    min-width: 90px;
    white-space: nowrap;
  }
  .btn {
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 18px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .btn:hover { background: rgba(255,255,255,0.18); }
  .btn.green { background: #1a7a4a; border-color: #1a7a4a; }
  .btn.green:hover { background: #22a060; }
  .btn.red { background: transparent; color: #e74c3c; border-color: #e74c3c; }
  .btn.red:hover { background: rgba(231,76,60,0.15); }
  .period-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .period-btn {
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.8);
    border-radius: 6px;
    padding: 4px 11px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .period-btn.active { background: #c0392b; color: #fff; border-color: #c0392b; }
  .reset-btn {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
    text-align: left;
    padding: 0;
  }
</style>
</head>
<body>

<!-- ТАБЛО -->
<div class="board">
  <div class="team">
    <span class="team-name">СШ Дубна</span>
  </div>
  <div class="score-block">
    <span class="score" id="s1">0</span>
    <span class="score-sep">:</span>
    <span class="score" id="s2">0</span>
    <span class="period" id="period-label">Тайм 1</span>
  </div>
  <div class="team">
    <span class="team-name">ФК Заря</span>
  </div>
</div>

<!-- УПРАВЛЕНИЕ -->
<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">СШ Дубна</span>
    <button class="btn green" onclick="goal(1,1)">+1</button>
    <button class="btn red" onclick="goal(1,-1)">−1</button>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">ФК Заря</span>
    <button class="btn green" onclick="goal(2,1)">+1</button>
    <button class="btn red" onclick="goal(2,-1)">−1</button>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Тайм</span>
    <div class="period-btns">
      <button class="period-btn active" id="pb1" onclick="setPeriod(1)">1-й</button>
      <button class="period-btn" id="pb2" onclick="setPeriod(2)">2-й</button>
      <button class="period-btn" id="pb3" onclick="setPeriod(3)">ДВ</button>
      <button class="period-btn" id="pb4" onclick="setPeriod(4)">Пен</button>
      <button class="period-btn" id="pb5" onclick="setPeriod(5)">Конец</button>
    </div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Сбросить счёт</button>
</div>

<script>
var sc = [0, 0];
var periods = ['Тайм 1','Тайм 2','Доп. время','Пенальти','Конец'];
var curP = 0;

function goal(team, delta) {
  var i = team - 1;
  sc[i] = Math.max(0, sc[i] + delta);
  document.getElementById('s' + team).textContent = sc[i];
}

function setPeriod(n) {
  curP = n - 1;
  document.getElementById('period-label').textContent = periods[curP];
  for (var i = 1; i <= 5; i++) {
    document.getElementById('pb' + i).classList.toggle('active', i === n);
  }
}

function resetAll() {
  sc = [0, 0];
  document.getElementById('s1').textContent = '0';
  document.getElementById('s2').textContent = '0';
  setPeriod(1);
}
</script>
</body>
</html>
