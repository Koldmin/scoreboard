<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; width: 100%; height: 100%; }
  .board {
    display: inline-flex;
    align-items: center;
    background: rgba(15, 15, 30, 0.88);
    border-radius: 8px;
    overflow: hidden;
    font-family: Arial, sans-serif;
    border: 1px solid rgba(255,255,255,0.12);
    position: fixed;
    top: 16px;
    left: 16px;
  }
  .team {
    display: flex;
    align-items: center;
    padding: 10px 14px;
  }
  .team-name {
    font-size: 18px;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .score-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    padding: 10px 16px;
    border-left: 1px solid rgba(255,255,255,0.1);
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .score {
    font-size: 30px;
    font-weight: 600;
    color: #ffffff;
    min-width: 26px;
    text-align: center;
    line-height: 1;
  }
  .score-sep {
    font-size: 24px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
  }
  .period {
    background: #c0392b;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="board">
  <div class="team">
    <span class="team-name">СШ Дубна</span>
  </div>
  <div class="score-block">
    <span class="score" id="s1">0</span>
    <span class="score-sep">:</span>
    <span class="score" id="s2">0</span>
    <span class="period" id="period-label">Тайм 1</span>
  </div>
  <div class="team">
    <span class="team-name">ФК Заря</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyAVcqA4WEKS67HMLTHm85OZT-pQ4daVhvg",
    authDomain: "scoreboard-66c2a.firebaseapp.com",
    databaseURL: "https://scoreboard-66c2a-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "scoreboard-66c2a",
    storageBucket: "scoreboard-66c2a.appspot.com",
    messagingSenderId: "1053393288052",
    appId: "1:1053393288052:web:fe024b201931c947f18a21"
  });

  const db = getDatabase(app);
  const scoreRef = ref(db, 'score');

  onValue(scoreRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      document.getElementById('s1').textContent = data.s1 ?? 0;
      document.getElementById('s2').textContent = data.s2 ?? 0;
      document.getElementById('period-label').textContent = data.period ?? 'Тайм 1';
    }
  });
</script>
</body>
</html>
